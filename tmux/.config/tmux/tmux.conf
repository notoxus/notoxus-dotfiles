# ═══════════════════════════════════════════════════════════════════
#  tmux.conf · CachyOS / niri · catppuccin mocha
#  Managed via dotfiles (install.sh). Glyphs require a Nerd Font.
#  Lives at ~/.config/tmux/tmux.conf (XDG); tpm auto-detects this and
#  installs plugins under ~/.config/tmux/plugins/ instead of ~/.tmux/.
# ═══════════════════════════════════════════════════════════════════

# ── Palette (catppuccin mocha) ─────────────────────────────────────
set -g @thm_fg      "#cdd6f4"
set -g @thm_crust   "#11111b"
set -g @thm_surface "#313244"
set -g @thm_overlay "#6c7086"
set -g @thm_muted   "#a6adc8"
set -g @thm_blue    "#89b4fa"
set -g @thm_mauve   "#cba6f7"
set -g @thm_yellow  "#f9e2af"
set -g @thm_peach   "#fab387"
set -g @thm_green   "#a6e3a1"
set -g @thm_red     "#f38ba8"

# ── Terminal & performance ─────────────────────────────────────────
set  -g default-terminal "tmux-256color"
set  -ga terminal-overrides ",*256col*:Tc"      # truecolor
set  -ga terminal-features ",*:usstyle"         # undercurl support
set  -s  escape-time 10                          # no ESC lag in vim/nvim
set  -g  focus-events on
set  -g  history-limit 50000
set  -g  display-time 1500
set  -g  status-interval 5
set  -g  set-clipboard on                        # yank -> system clipboard (OSC52)
setw -g  aggressive-resize on
set  -g  allow-passthrough on                    # image / graphics protocols

# ── Behaviour & workflow defaults ──────────────────────────────────
set  -g  mouse on
set  -g  base-index 1                            # windows start at 1
setw -g  pane-base-index 1
set  -g  renumber-windows on                     # no gaps in window indexes
set  -g  detach-on-destroy off                   # stay attached when a session closes
set  -g  set-titles on
set  -g  set-titles-string "#S · #W"
setw -g  mode-keys vi

# ═══════════════════════════════════════════════════════════════════
#  Keybindings   (prefix stays C-b)
# ═══════════════════════════════════════════════════════════════════

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display " tmux.conf reloaded"

# Splits & new windows keep the current working directory
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window      -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Repeatable pane resize (hold prefix, tap H/J/K/L)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind Tab last-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
# Popup windows
bind -n M-Enter display-popup -E -w 75% "tmux new-session -A -s scratch"
# Panes: layout / zoom / kill (no confirm prompts)
bind Space next-layout
bind z resize-pane -Z
bind x kill-pane
bind X kill-window

# Copy-mode (vi): v begin, C-v rectangle, y yank
bind Enter copy-mode
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ═══════════════════════════════════════════════════════════════════
#  Status bar
# ═══════════════════════════════════════════════════════════════════
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=default,fg=#{@thm_fg}"
set -g status-left-length 100
set -g status-right-length 200
set -g message-style "bg=#{@thm_surface},fg=#{@thm_fg}"
set -g mode-style    "bg=#{@thm_mauve},fg=#{@thm_crust}"

# Pane borders
set -g pane-border-style        "fg=#{@thm_surface}"
set -g pane-active-border-style "fg=#{@thm_blue}"

# ── Left: session name (peach + lock glyph while prefix is held) ────
set -g status-left \
"#[fg=#{?client_prefix,#{@thm_peach},#{@thm_blue}},bg=default]#[fg=#{@thm_crust},bg=#{?client_prefix,#{@thm_peach},#{@thm_blue}},bold] #{?client_prefix,,} #[fg=#{?client_prefix,#{@thm_peach},#{@thm_blue}},bg=#{@thm_surface}] #S #[fg=#{?client_prefix,#{@thm_peach},#{@thm_blue}},bg=default] "

# ── Windows ────────────────────────────────────────────────────────
set -g window-status-separator ""
set -g window-status-format \
"#[fg=#{@thm_surface},bg=default]#[fg=#{@thm_muted},bg=#{@thm_surface}] #I #[fg=#{@thm_overlay}]#W #[fg=#{@thm_surface},bg=default] "
set -g window-status-current-format \
"#[fg=#{@thm_mauve},bg=default]#[fg=#{@thm_crust},bg=#{@thm_mauve},bold] #I #[fg=#{@thm_fg},bg=#{@thm_surface}] #W#{?window_zoomed_flag, 󰊓,} #[fg=#{@thm_surface},bg=default] "

# ── Right: greeting · weather · cpu · ram · clock ──────────────────
set -g status-right ""
set -ag status-right "#[fg=#{@thm_overlay},bg=default,italics]#(~/.config/tmux/status-msg.sh '#{pane_current_command}')#[none] "
set -ag status-right "#[fg=#{@thm_yellow},bg=default]#[fg=#{@thm_crust},bg=#{@thm_yellow},bold]󰔏 #[fg=#{@thm_yellow},bg=#{@thm_surface}] #(~/.config/tmux/weather.sh) #[fg=#{@thm_surface},bg=default] "
set -ag status-right "#[fg=#{@thm_peach},bg=default]#[fg=#{@thm_crust},bg=#{@thm_peach},bold] #[fg=#{@thm_peach},bg=#{@thm_surface}] #{cpu_percentage} #[fg=#{@thm_surface},bg=default] "
set -ag status-right "#[fg=#{@thm_green},bg=default]#[fg=#{@thm_crust},bg=#{@thm_green},bold] #[fg=#{@thm_green},bg=#{@thm_surface}] #{ram_percentage} #[fg=#{@thm_surface},bg=default] "
set -ag status-right "#[fg=#{@thm_mauve},bg=default]#[fg=#{@thm_crust},bg=#{@thm_mauve},bold]󰥔 #[fg=#{@thm_mauve},bg=#{@thm_surface}] %d/%m %H:%M #[fg=#{@thm_surface},bg=default]"

# ═══════════════════════════════════════════════════════════════════
#  Plugins (tpm)   — install: prefix + I   ·   update: prefix + U
# ═══════════════════════════════════════════════════════════════════
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save + auto-restore

set -g @cpu_percentage_format "%2.1f%%"
set -g @ram_percentage_format "%2.0f%%"

# Session persistence across reboots
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.config/tmux/plugins/tpm/tpm'
